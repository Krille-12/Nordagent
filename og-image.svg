<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- Background -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#faf8f5" />
      <stop offset="50%" style="stop-color:#f5ede0" />
      <stop offset="100%" style="stop-color:#ede8df" />
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)" />

  <!-- Decorative circle top-right -->
  <circle cx="1080" cy="80" r="260" fill="#c8a97e" opacity="0.08" />
  <!-- Decorative circle bottom-left -->
  <circle cx="120" cy="560" r="140" fill="#c8a97e" opacity="0.07" />

  <!-- Left accent bar -->
  <rect x="80" y="200" width="6" height="120" rx="3" fill="#8c5e3c" opacity="0.6" />

  <!-- Logo wordmark -->
  <text x="110" y="260" font-family="Inter, system-ui, sans-serif" font-size="72" font-weight="800" letter-spacing="-2" fill="#3a302c">Nord<tspan fill="#8c5e3c">agent</tspan></text>

  <!-- Tagline -->
  <text x="110" y="330" font-family="Inter, system-ui, sans-serif" font-size="32" font-weight="400" fill="#6e6054">AI-automatisering for danske virksomheder</text>

  <!-- Divider -->
  <line x1="110" y1="365" x2="640" y2="365" stroke="#e0d8cc" stroke-width="1.5" />

  <!-- Sub-tagline -->
  <text x="110" y="410" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="400" fill="#a89888">Spar timer hver uge med intelligente AI-agenter</text>

  <!-- Trust badges -->
  <rect x="110" y="460" width="180" height="44" rx="22" fill="rgba(107,140,107,0.12)" />
  <text x="200" y="487" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="600" fill="#4a6e4a" text-anchor="middle">GDPR-compliant</text>

  <rect x="306" y="460" width="180" height="44" rx="22" fill="rgba(140,94,60,0.10)" />
  <text x="396" y="487" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="600" fill="#8c5e3c" text-anchor="middle">Dansk virksomhed</text>

  <rect x="502" y="460" width="170" height="44" rx="22" fill="rgba(200,169,126,0.15)" />
  <text x="587" y="487" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="600" fill="#6e5038" text-anchor="middle">Klar på få uger</text>

  <!-- URL bottom-right -->
  <text x="1090" y="590" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="500" fill="#a89888" text-anchor="end">nordagent.dk</text>
</svg>
